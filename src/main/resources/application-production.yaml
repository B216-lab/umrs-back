spring:
    mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
            mail.smtp.auth: ${MAIL_SMTP_AUTH}
            mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE}
            mail.smtp.starttls.required: ${MAIL_SMTP_STARTTLS_REQUIRED}
            mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST}
    datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}

server:
    port: ${SERVER_PORT}

app:
    admin:
        username: ${APP_ADMIN_USERNAME}
        password: ${APP_ADMIN_PASSWORD}


# CORS configuration
cors:
    # Разрешённые origins для CORS (через запятую, с портами)
    # Пример: https://example.com:443,https://app.example.com:443
    allowed:
        origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
    api-docs:
        enabled: false
    swagger-ui:
        enabled: false
