name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  verify-tag:
    name: Verify tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is in main history
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "The tagged commit must be an ancestor of origin/main (create tags from main only)."
            exit 1
          fi

  smoke:
    name: PR validation smoke (reuse)
    needs: verify-tag
    uses: ./.github/workflows/reusable-docker-smoke.yml

  export-openapi:
    name: Export OpenAPI artifacts
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Spring Gradle Build Action
        uses: spring-io/spring-gradle-build-action@v2
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Prepare env file
        run: |
          cp .env.example .env
          source .env

      - name: Create network
        run: docker network create shared-net

      - name: Start Postgres for OpenAPI export
        run: docker compose -f ci-compose.yml up -d postgres

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose -f ci-compose.yml exec -T postgres pg_isready -U myuser -d mydatabase; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Export OpenAPI
        run: ./gradlew exportOpenApi

      - name: Stop Postgres
        if: always()
        run: docker compose -f ci-compose.yml down -v

      - name: Upload OpenAPI specs
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs
          path: build/openapi/

  docker-publish:
    name: Build and push Docker image
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve app version
        id: ver
        run: |
          SEMVER="${GITHUB_REF_NAME#v}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.semver }}

  github-release:
    name: Publish GitHub release
    needs: [export-openapi, docker-publish]
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenAPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: openapi-specs
          path: openapi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            openapi/openapi.json
            openapi/openapi.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
