name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Conventional PR title
        uses: ytanikin/pr-conventional-commits@1.5.1
        with:
          task_types: '["feat","fix","docs","style","refactor","perf","test","build","ci","chore","revert"]'
          custom_labels: '{"feat": "feature", "fix": "fix", "docs": "documentation", "test": "test", "ci": "CI/CD", "refactor": "refactor", "perf": "performance", "chore": "chore", "revert": "revert", "wip": "WIP"}'
          add_label: "true"

  docker-smoke:
    name: Docker runtime smoke check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Prepare env file
        run: |
          cp .env.example .env
          source .env
          
      - name: Create network
        run: docker network create shared-net

      - name: Start stack
        run: docker compose -f ci-compose.yml up -d --build

      - name: Wait for app readiness
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8081/api/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f ci-compose.yml logs app postgres
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose -f ci-compose.yml down -v
