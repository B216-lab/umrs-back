name: Publish to staging
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    uses: B216-lab/.github/.github/workflows/ssh-deploy.yml@main
    with:
      app_path: /opt/umrs-back
    secrets:
      DEPLOY_HOST: ${{ secrets.HOST }}
      DEPLOY_USERNAME: ${{ secrets.USERNAME }}
      DEPLOY_KEY: ${{ secrets.KEY }}
      DEPLOY_PORT: ${{ secrets.PORT }}
