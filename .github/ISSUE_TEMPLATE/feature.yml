name: "Feature Request"
description: "Use for new features or requirement changes"
title: "[Feature] "
labels: ["feature"]

body:
  - type: textarea
    id: background
    attributes:
      label: Background / scenario
      placeholder: Briefly describe why this is needed
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Requirement description
      placeholder: |
        What should the system do? How will users use it?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Scenario 1: ...
        - [ ] Scenario 2: ...
    validations:
      required: true