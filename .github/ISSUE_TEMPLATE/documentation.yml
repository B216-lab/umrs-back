name: Documentation
description: Suggest updates or additions to documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    id: documentation_update
    attributes:
      label: Documentation Update
      description: What part of the documentation needs to be updated or added?
      placeholder: Identify the page, section, or missing content.
    validations:
      required: true

  - type: markdown
    id: why_needed
    attributes:
      label: Why Is This Needed?
      description: Explain the importance of this update.
      placeholder: Why should this be documented now?
    validations:
      required: true

  - type: markdown
    id: suggested_changes
    attributes:
      label: Suggested Changes
      description: Provide a detailed description of the changes.
      placeholder: Include structure, wording, and examples if possible.
    validations:
      required: true

  - type: markdown
    id: additional_context
    attributes:
      label: Additional Context
      description: Include any related resources.
      placeholder: Links, references, screenshots, and notes.
    validations:
      required: false
