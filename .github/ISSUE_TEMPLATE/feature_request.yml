name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    id: feature_description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: Describe the feature and intended behavior.
    validations:
      required: true

  - type: markdown
    id: why_needed
    attributes:
      label: Why Is This Needed?
      description: Explain the problem or need for this feature.
      placeholder: What pain point does this solve?
    validations:
      required: true

  - type: markdown
    id: suggested_solutions
    attributes:
      label: Suggested Solutions
      description: Describe how this feature could be implemented.
      placeholder: Share possible implementation ideas.
    validations:
      required: false

  - type: markdown
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any relevant screenshots, links, or resources.
      placeholder: Related references or examples.
    validations:
      required: false
